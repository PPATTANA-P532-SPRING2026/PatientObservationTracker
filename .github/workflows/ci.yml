name: CI/CD

on:
  push:
    branches: [ main, week-2-changes ]
  pull_request:
    branches: [ main, week-2-changes ]

permissions:
  contents: read

jobs:

  # ── Test ─────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: ./mvnw -q test

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-report
          path: target/surefire-reports/

  # ── Build ─────────────────────────────────────────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build jar
        run: ./mvnw -q package -DskipTests

      - name: Build Docker image
        run: docker build -t patient-observation-tracker .

  # ── Deploy backend — main branch → original Render service ───────────
  deploy-backend-main:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy (main)
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

  # ── Deploy backend — week-2-changes branch → separate Render service ──
  deploy-backend-week2:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/week-2-changes'
    steps:
      - name: Trigger Render deploy (week-2-changes)
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_WEEK2 }}"

  # ── Deploy frontend — main branch → GitHub Pages ─────────────────────
  deploy-frontend-main:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./src/main/resources/static
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Deploy frontend — week-2-changes branch → GitHub Pages ───────────
  deploy-frontend-week2:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/week-2-changes'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./src/main/resources/static
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
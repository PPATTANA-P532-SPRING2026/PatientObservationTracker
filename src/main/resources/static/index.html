<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Observation Tracker</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav>
    <a class="brand" href="/">POTracker</a>
    <a href="/">Patients</a>
    <a href="catalogue.html">Catalogue</a>
    <a href="logs.html">Logs</a>

    <!-- login dropdown -->
    <div style="margin-left:auto;display:flex;
              align-items:center;gap:10px">
    <span style="color:rgba(255,255,255,.5);
                 font-size:12px">Logged in as:</span>
        <select id="userSelect"
                onchange="setCurrentUser()"
                style="background:#2a2a27;color:#fff;
                   border:1px solid rgba(255,255,255,.2);
                   border-radius:4px;padding:4px 8px;
                   font-size:12px;cursor:pointer">
            <option value="">Select user…</option>
        </select>
    </div>
    <div id="userWarning"
         style="display:none;background:#fff3cd;color:#856404;
            padding:10px 24px;font-size:13px;
            border-bottom:1px solid #ffc107">
        ⚠ You are not logged in. Please select a user from the dropdown above,
        or <a href="logs.html" style="color:#856404;font-weight:bold">
        go to Logs to create a user first.</a>

    </div>
</nav>

<div class="page">
    <h1>Patients</h1>

    <div class="grid-2">

        <!-- Patient list -->
        <div>
            <h2>All Patients</h2>
            <div id="patientList"><p class="loading">Loading…</p></div>
        </div>

        <!-- Add patient form -->
        <div>
            <div class="card">
                <h2>Add Patient</h2>
                <div id="addMsg"></div>
                <div class="form-row">
                    <label>Full Name</label>
                    <input id="fullName" type="text" placeholder="e.g. John Smith">
                </div>
                <div class="form-row">
                    <label>Date of Birth</label>
                    <input id="dob" type="date">
                </div>
                <div class="form-row">
                    <label>Note (optional)</label>
                    <textarea id="note" placeholder="Clinical notes…"></textarea>
                </div>
                <button class="btn btn-primary" onclick="addPatient()">Add Patient</button>
            </div>
        </div>

    </div>
</div>

<script src="js/app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Observation Tracker</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav>
    <a class="brand" href="/">POTracker</a>
    <a href="/" class="active">Patients</a>
    <a href="catalogue.html">Catalogue</a>
    <a href="logs.html">Logs</a>
</nav>

<div class="page">
    <h1>Patients</h1>

    <div class="grid-2">

        <!-- Patient list -->
        <div>
            <h2>All Patients</h2>
            <div id="patientList"><p class="loading">Loading…</p></div>
        </div>

        <!-- Add patient form -->
        <div>
            <div class="card">
                <h2>Add Patient</h2>
                <div id="addMsg"></div>
                <div class="form-row">
                    <label>Full Name</label>
                    <input id="fullName" type="text" placeholder="e.g. John Smith">
                </div>
                <div class="form-row">
                    <label>Date of Birth</label>
                    <input id="dob" type="date">
                </div>
                <div class="form-row">
                    <label>Note (optional)</label>
                    <textarea id="note" placeholder="Clinical notes…"></textarea>
                </div>
                <button class="btn btn-primary" onclick="addPatient()">Add Patient</button>
            </div>
        </div>

    </div>
</div>

<script src="js/app.js"></script>

</body>
</html>

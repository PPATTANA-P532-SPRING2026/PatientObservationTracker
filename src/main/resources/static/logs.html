<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs — POTracker</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<nav>
    <a class="brand" href="/">POTracker</a>
    <a href="/">Patients</a>
    <a href="/catalogue.html">Catalogue</a>
    <a href="/logs.html" class="active">Logs</a>
</nav>

<div class="page">
    <h1>Logs</h1>

    <div class="grid-2">

        <div>
            <div style="display:flex;align-items:center;
                  justify-content:space-between;margin-bottom:14px">
                <h2 style="margin:0">Command Log</h2>
                <button class="btn btn-ghost btn-sm" onclick="loadLogs()">↺ Refresh</button>
            </div>
            <p class="small muted" style="margin-bottom:14px">
                Every state-changing action, with full JSON payload for audit and future undo.
            </p>
            <div id="commandLog"><p class="loading">Loading…</p></div>
        </div>

        <div>
            <div style="display:flex;align-items:center;
                  justify-content:space-between;margin-bottom:14px">
                <h2 style="margin:0">Audit Log</h2>
            </div>
            <p class="small muted" style="margin-bottom:14px">
                Observation lifecycle events and rule evaluation inferences.
            </p>
            <div id="auditLog"><p class="loading">Loading…</p></div>
        </div>

    </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>

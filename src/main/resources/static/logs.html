<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs — POTracker</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<nav>
    <a class="brand" href="index.html">POTracker</a>
    <a href="index.html">Patients</a>
    <a href="catalogue.html">Catalogue</a>
    <a href="logs.html" class="active">Logs</a>
    <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
        <span style="color:rgba(255,255,255,.5);font-size:12px">Logged in as:</span>
        <select id="userSelect" onchange="setCurrentUser()"
                style="background:#2a2a27;color:#fff;border:1px solid rgba(255,255,255,.2);
                   border-radius:4px;padding:4px 8px;font-size:12px;cursor:pointer">
            <option value="">Select user...</option>
        </select>
    </div>
</nav>
<div class="page">
    <h1>Logs</h1>

    <!-- User Management -->
    <div class="card" style="margin-bottom:24px">
        <h2>Users</h2>
        <div id="userMsg"></div>
        <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">
            <div class="form-row" style="margin:0;flex:1">
                <label>Username</label>
                <input id="newUsername" type="text" placeholder="e.g. dr.smith">
            </div>
            <div class="form-row" style="margin:0">
                <label>Role</label>
                <select id="newRole">
                    <option value="CLINICIAN">Clinician</option>
                    <option value="ADMIN">Admin</option>
                </select>
            </div>
            <button class="btn btn-primary" style="margin-bottom:0"
                    onclick="createUser()">Add User</button>
        </div>
        <div id="userList" style="margin-top:14px"></div>
    </div>

    <div class="grid-2">
        <div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
                <h2 style="margin:0">Command Log</h2>
                <button class="btn btn-ghost btn-sm" onclick="loadLogs()">Refresh</button>
            </div>
            <p class="small muted" style="margin-bottom:14px">
                Every state-changing action with full JSON payload.
            </p>
            <div id="commandLog"><p class="loading">Loading...</p></div>
        </div>
        <div>
            <h2>Audit Log</h2>
            <p class="small muted" style="margin-bottom:14px">
                Observation lifecycle events and rule evaluation inferences.
            </p>
            <div id="auditLog"><p class="loading">Loading...</p></div>
        </div>
    </div>
</div>
<script src="js/app.js"></script>
</body>
</html>
